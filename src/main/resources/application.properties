spring.application.name=contactpro
spring.datasource.url=jdbc:postgresql://localhost:5432/contactpro
spring.datasource.username=contactpro
spring.datasource.password=contactpro

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
google.scope=openid email profile https://www.googleapis.com/auth/contacts.readonly